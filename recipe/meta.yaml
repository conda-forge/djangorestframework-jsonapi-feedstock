{% set name = "djangorestframework-jsonapi" %}
{% set version = "8.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: d02defa331c240cef136dc522f670e5535a2f1fad182dc04bd4abf4c4a747340

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - django-filter
    - python >={{ python_min }}
    - inflection >=0.5.0
    - djangorestframework >=3.15
    - django >=4.2

test:
  imports:
    - rest_framework_json_api
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/django-json-api/django-rest-framework-json-api
  summary: A Django REST framework API adapter for the JSON:API spec.
  license: BSD-2-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
    - cshaley
